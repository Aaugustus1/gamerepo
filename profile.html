<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="referrer" content="no-referrer" />
<title>My Profile · The Game Repository</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131c;
    --surface-2: #1c1c2b;
    --border: rgba(255,255,255,0.07);
    --text: #e8e8f0;
    --muted: #6b6b88;
    --accent: #7c6dfa;
    --accent-strong: #a855f7;
    --danger: #f56d6d;
    --success: #42f5a1;
    --font-body: 'Trebuchet MS', 'Lucida Sans', sans-serif;
    --font-mono: 'Courier New', monospace;
    --font-display: 'Georgia', 'Times New Roman', serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:0.95rem;line-height:1.6;min-height:100dvh}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% -10%, rgba(124,109,250,0.12) 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 80% 110%, rgba(168,85,247,0.09) 0%, transparent 55%);pointer-events:none;z-index:0}
  a{color:inherit;text-decoration:none}
  header{position:sticky;top:0;z-index:50;height:60px;background:rgba(10,10,15,0.85);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
  header .inner{max-width:1100px;margin:0 auto;height:100%;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem}
  header h1{font-family:var(--font-display);font-size:1.2rem;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  header .actions{display:flex;align-items:center;gap:0.75rem}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:0.4rem;padding:0.55rem 1rem;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:0.85rem;transition:all 0.15s}
  .btn-primary{background:var(--accent-strong);color:#fff}
  .btn-primary:hover{background:#b970ff;transform:translateY(-1px)}
  .btn-ghost{background:rgba(255,255,255,0.06);color:var(--text);border:1px solid var(--border)}
  .btn-ghost:hover{background:rgba(255,255,255,0.12)}
  .layout{max-width:900px;margin:0 auto;padding:2.5rem 1.5rem;position:relative;z-index:1}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2rem;box-shadow:0 4px 24px rgba(0,0,0,0.4);margin-bottom:1.5rem}
  .card h2{font-family:var(--font-display);font-size:1.3rem;margin-bottom:0.25rem}
  .card .subtitle{color:var(--muted);font-size:0.85rem;margin-bottom:1.5rem}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  @media (max-width:600px){.grid-2{grid-template-columns:1fr}}
  label{display:block;font-size:0.72rem;font-family:var(--font-mono);color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.4rem}
  input[type=text],input[type=email]{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#fff;padding:0.7rem 0.85rem;border-radius:8px;outline:none}
  input:focus{border-color:var(--accent)}
  .pfp-section{display:flex;align-items:center;gap:1.5rem;margin-bottom:1.5rem}
  .pfp-wrap{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-strong));display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:800;color:#fff;overflow:hidden;flex-shrink:0;border:3px solid var(--border)}
  .pfp-wrap img{width:100%;height:100%;object-fit:cover;display:block}
  .pfp-actions .row{margin-top:0.4rem}
  .pfp-actions input[type=file{background:rgba(255,255,255,0.05);border:1px solid var(--border);padding:0.4rem;border-radius:6px;color:var(--text)}
  .info-row{display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid var(--border);font-size:0.9rem}
  .info-row:last-child{border-bottom:none}
  .info-row .label{color:var(--muted);font-family:var(--font-mono);font-size:0.78rem;text-transform:uppercase;letter-spacing:0.05em}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface-2);color:var(--text);padding:11px 22px;border-radius:999px;font-size:0.85rem;font-weight:600;border:1px solid var(--border);opacity:0;transition:all 0.22s;z-index:9999;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.ok{border-color:rgba(66,245,161,0.5);color:var(--success)}
  .toast.error{border-color:rgba(245,109,109,0.5);color:var(--danger)}
  .empty{padding:2rem;text-align:center;color:var(--muted)}
  .pfp-actions input[type=file]{font-family:inherit;font-size:0.78rem;color:var(--text)}
</style>
</head>
<body>
<header>
  <div class="inner">
    <h1>My Profile · TGR</h1>
    <div class="actions">
      <a class="btn btn-ghost" href="index.html">← Back to site</a>
      <a class="btn btn-ghost" href="admin.html" id="adminLink" style="display:none">Admin</a>
      <button class="btn btn-ghost" id="logoutBtn">Logout</button>
    </div>
  </div>
</header>

<div class="layout">
  <div class="card">
    <h2>Profile</h2>
    <p class="subtitle">Manage how you appear on The Game Repository.</p>

    <div class="pfp-section">
      <div class="pfp-wrap" id="pfpWrap">?</div>
      <div class="pfp-actions" style="flex:1">
        <div style="font-weight:700;margin-bottom:0.2rem" id="displayName">Loading…</div>
        <div style="color:var(--muted);font-size:0.85rem" id="displayTag">@…</div>
        <div class="row" style="margin-top:0.6rem;align-items:center;gap:0.5rem">
          <input type="file" id="pfpFile" accept="image/*">
          <button class="btn btn-primary btn-sm" id="uploadPfpBtn">Upload picture</button>
          <button class="btn btn-ghost btn-sm" id="removePfpBtn">Remove</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Account info</h2>
    <p class="subtitle">Update your display name and @tag handle.</p>
    <form id="profileForm" class="stack" style="display:flex;flex-direction:column;gap:1rem">
      <div class="grid-2">
        <div><label>Display name</label><input type="text" name="name" id="nameInput" required></div>
        <div><label>@tag handle</label><input type="text" name="tag" id="tagInput" required></div>
      </div>
      <div class="row" style="justify-content:flex-end">
        <button type="submit" class="btn btn-primary">Save changes</button>
      </div>
    </form>
  </div>

  <div class="card">
    <h2>Account details</h2>
    <p class="subtitle">Read-only information.</p>
    <div class="info-row"><span class="label">Email</span><span id="infoEmail">–</span></div>
    <div class="info-row"><span class="label">Role</span><span id="infoRole">–</span></div>
    <div class="info-row"><span class="label">Joined</span><span id="infoJoined">–</span></div>
    <div class="info-row"><span class="label">Wishlist count</span><span id="infoWishlist">0</span></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="profile.js"></script>
</body>
</html>
